<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Distribuidora Jaramillo</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .reset-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .reset-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .reset-header i {
            font-size: 60px;
            color: #1e3c72;
            margin-bottom: 15px;
        }
        .reset-header h2 {
            color: #343a40;
            margin-bottom: 5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #343a40;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #1e3c72;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, opacity 0.3s;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }
        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin-bottom: 20px;
            padding: 10px;
            background: #f8d7da;
            border-radius: 8px;
            display: none;
        }
        .success-message {
            color: #28a745;
            font-size: 14px;
            margin-bottom: 20px;
            padding: 10px;
            background: #d4edda;
            border-radius: 8px;
            display: none;
        }
        .toggle-password {
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-header">
            <i class="fas fa-key"></i>
            <h2>Restablecer Contraseña</h2>
            <p>Ingresa tu nueva contraseña</p>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        
        <form id="resetForm">
            <div class="form-group">
                <label>Nueva Contraseña</label>
                <div style="position: relative;">
                    <input type="password" id="password" placeholder="●●●●●●●●" required style="width: 100%; padding: 12px; padding-right: 40px; box-sizing: border-box;">
                    <span class="toggle-password" data-target="password" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 20px;">👁️</span>
                </div>
            </div>
            <div class="form-group">
                <label>Confirmar Contraseña</label>
                <div style="position: relative;">
                    <input type="password" id="confirmPassword" placeholder="●●●●●●●●" required style="width: 100%; padding: 12px; padding-right: 40px; box-sizing: border-box;">
                    <span class="toggle-password" data-target="confirmPassword" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 20px;">👁️</span>
                </div>
            </div>
            <button type="submit" class="btn" id="submitBtn">
                <i class="fas fa-save"></i> Guardar Nueva Contraseña
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://nsqmdzggpmkgqxambcdb.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_YNAruRZW71R3uUkWKHeONQ_dBWQwS4k';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Detectar el entorno y establecer la URL base correcta
        function getBaseUrl() {
            const hostname = window.location.hostname;
            // Si es localhost, usar localhost, si no, usar el dominio actual
            if (hostname === 'localhost' || hostname === '127.0.0.1') {
                return window.location.origin;
            } else {
                // Para Render o cualquier otro dominio de producción
                return window.location.origin;
            }
        }

        // Verificar si viene de un email de restablecimiento
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        const accessToken = hashParams.get('access_token');
        const refreshToken = hashParams.get('refresh_token');
        const type = hashParams.get('type');

        if (type === 'recovery' && accessToken) {
            supabaseClient.auth.setSession({
                access_token: accessToken,
                refresh_token: refreshToken
            }).then(({ error }) => {
                if (error) {
                    console.error('Error setting session:', error);
                    document.getElementById('errorMessage').textContent = 'El enlace de restablecimiento ha expirado o no es válido.';
                    document.getElementById('errorMessage').style.display = 'block';
                }
            });
        } else {
            // Si no hay token de recuperación, mostrar mensaje
            document.getElementById('errorMessage').textContent = 'Enlace de restablecimiento no válido. Por favor, solicita un nuevo enlace.';
            document.getElementById('errorMessage').style.display = 'block';
        }

        // Toggle para mostrar/ocultar contraseñas
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                if (input) {
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    this.textContent = type === 'password' ? '👁️' : '🔒';
                }
            });
        });

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');
            const submitBtn = document.getElementById('submitBtn');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (password !== confirmPassword) {
                errorMsg.textContent = 'Las contraseñas no coinciden';
                errorMsg.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorMsg.textContent = 'La contraseña debe tener al menos 6 caracteres';
                errorMsg.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Actualizando...';

            try {
                const { error } = await supabaseClient.auth.updateUser({
                    password: password
                });

                if (error) throw error;

                successMsg.textContent = '¡Contraseña actualizada correctamente! Redirigiendo al login...';
                successMsg.style.display = 'block';

                // Redirigir a la página principal usando la URL base correcta
                setTimeout(() => {
                    window.location.href = getBaseUrl() + '/';
                }, 3000);

            } catch (error) {
                console.error('Error:', error);
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Guardar Nueva Contraseña';
            }
        });
    </script>
</body>
</html>
